<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Point (Tungsten/Steel) -->
    <polygon points="1,1 5,8 8,5" fill="#E2E8F0" stroke="#0F172A" stroke-width="1" stroke-linejoin="round"/>
    <line x1="1.5" y1="1.5" x2="6.5" y2="6.5" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Barrel (Dark metallic) -->
    <polygon points="5,8 8,5 17,14 14,17" fill="#475569" stroke="#0F172A" stroke-width="1" stroke-linejoin="round"/>
    
    <!-- Barrel highlights (Top half silver-ish) -->
    <polygon points="6.5,6.5 8,5 17,14 15.5,15.5" fill="#94A3B8"/>
    
    <!-- Deep cuts/grips -->
    <line x1="7" y1="11" x2="11" y2="7" stroke="#0F172A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="13" x2="13" y2="9" stroke="#0F172A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="15" x2="15" y2="11" stroke="#0F172A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13" y1="17" x2="17" y2="13" stroke="#0F172A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Shaft (Black/Grey) -->
    <polygon points="14,17 17,14 24,21 21,24" fill="#1E293B" stroke="#0F172A" stroke-width="1" stroke-linejoin="round"/>
    <line x1="15.5" y1="15.5" x2="22.5" y2="22.5" stroke="#475569" stroke-width="1" stroke-linecap="round"/>

    <!-- Flight (High-vis DartStreak Green) -->
    <!-- Top Fin -->
    <polygon points="17,17 19,6 31,11 25,25" fill="#22C55E" stroke="#064E3B" stroke-width="1" stroke-linejoin="round"/>
    <!-- Bottom Fin -->
    <polygon points="17,17 6,19 11,31 25,25" fill="#15803D" stroke="#064E3B" stroke-width="1" stroke-linejoin="round"/>
    
    <!-- Flight Highlights / Ridges -->
    <line x1="18" y1="12" x2="25" y2="14" stroke="#86EFAC" stroke-width="0.75" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="14" y2="25" stroke="#166534" stroke-width="0.75" stroke-linecap="round"/>
    
    <!-- Center white stem of flight -->
    <line x1="17" y1="17" x2="25" y2="25" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
